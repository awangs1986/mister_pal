name: Build Benchmarks

# Dev tool: compiles every tools/*_bench.c (self-contained A9 micro-benchmarks)
# into static armhf binaries, uploaded as one "benchmarks" artifact for manual
# deploy to the MiSTer. NOT shipped, NOT part of the engine. Fast (~1-2 min):
# plain cross-compiler, no SDL/QEMU/Docker. Static link is fine here (no SDL).

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Build label'
        required: false
        type: string

run-name: ${{ inputs.reason || 'benchmarks' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ARM cross-compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-linux-gnueabihf
      - name: Compile all tools/*_bench.c (armhf, static, A9+NEON)
        run: |
          mkdir -p bench_out
          for f in tools/*_bench.c; do
            name=$(basename "$f" .c)
            echo "=== compiling $name ==="
            arm-linux-gnueabihf-gcc -O2 -static -mcpu=cortex-a9 -mfpu=neon -mfloat-abi=hard "$f" -o "bench_out/$name" -lrt
            file "bench_out/$name"
          done
          ls -la bench_out
      - uses: actions/upload-artifact@v4
        with:
          name: benchmarks
          path: bench_out/*
